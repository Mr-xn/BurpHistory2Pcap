name: Manual Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (for example: v1.0.1)
        required: true
        type: string
      release_name:
        description: Release title (optional)
        required: false
        type: string
      prerelease:
        description: Mark as prerelease
        required: false
        default: false
        type: boolean
      generate_release_notes:
        description: Auto-generate release notes
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shaded JAR
        run: gradle --no-daemon jar

      - name: Create GitHub release and upload JAR
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: ${{ inputs.release_name != '' && inputs.release_name || inputs.tag }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: ${{ inputs.generate_release_notes }}
          files: |
            build/libs/burphistory2pcap.jar
